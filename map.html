<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>IZGI MAP — Интерактив карта</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#f6f8f4;
    }

    header{
      padding:16px 24px;
      background:white;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    h1{
      font-size:20px;
      margin:0;
    }

    .filters{
      padding:12px 20px;
      background:#fff;
      display:flex;
      gap:10px;
      border-bottom:1px solid #eee;
    }

    select{
      padding:8px 12px;
      border-radius:10px;
      border:1px solid #ddd;
    }

    #map{
      height: calc(100vh - 120px);
    }
  </style>
</head>

<body>

<header>
  <h1>🌍 IZGI MAP — Жақсылық картасы</h1>
</header>

<div class="filters">
  <select id="typeFilter">
    <option value="all">Барлығы</option>
    <option value="eco">🌱 Экология</option>
    <option value="social">❤️ Әлеуметтік</option>
    <option value="volunteer">🤝 Волонтерлік</option>
  </select>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([48.0196, 66.9237], 5);

// карта слой
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// данные
const points = [

  // 🔴 ЖАЛАҒАШ (ОЧЕНЬ МНОГО)
  {city:"Жалағаш", type:"eco", title:"50 ағаш отырғызу", desc:"Ауылды көгалдандыру акциясы", lat:44.999, lng:64.123},
  {city:"Жалағаш", type:"eco", title:"Су жағасын тазалау", desc:"Өзен маңы тазартылды", lat:45.002, lng:64.118},
  {city:"Жалағаш", type:"eco", title:"Қоқыс жинау күні", desc:"200 кг қоқыс жиналды", lat:45.004, lng:64.121},
  {city:"Жалағаш", type:"eco", title:"Пластиксіз күн", desc:"Тұрғындар пластик қолданбады", lat:45.001, lng:64.130},
  {city:"Жалағаш", type:"eco", title:"Аула тазалау", desc:"Көпқабатты үйлер маңы тазаланды", lat:45.006, lng:64.126},

  {city:"Жалағаш", type:"social", title:"Қарттарға көмек", desc:"5 қартқа азық-түлік жеткізілді", lat:45.003, lng:64.124},
  {city:"Жалағаш", type:"social", title:"Мүгедек балаға көмек", desc:"Оқу құралдары берілді", lat:45.005, lng:64.127},
  {city:"Жалағаш", type:"social", title:"Көпбалалы отбасыға қолдау", desc:"Киім мен азық-түлік", lat:45.007, lng:64.129},
  {city:"Жалағаш", type:"social", title:"Дәрі-дәрмек көмегі", desc:"Науқасқа дәрілер алынды", lat:45.008, lng:64.120},
  {city:"Жалағаш", type:"social", title:"Жалғызбасты анаға көмек", desc:"Балаларға керек заттар", lat:45.002, lng:64.132},

  {city:"Жалағаш", type:"volunteer", title:"Кітап жинау", desc:"150 кітап тапсырылды", lat:45.006, lng:64.118},
  {city:"Жалағаш", type:"volunteer", title:"Балалармен ойын күні", desc:"Балаларға ойын ұйымдастырылды", lat:45.001, lng:64.125},
  {city:"Жалағаш", type:"volunteer", title:"Спорт күні", desc:"Жастар турнир өткізді", lat:45.004, lng:64.133},
  {city:"Жалағаш", type:"volunteer", title:"Тегін сабақ", desc:"Оқушыларға репетиторлық көмек", lat:45.009, lng:64.122},

  // 🔵 ҚЫЗЫЛОРДА
  {city:"Қызылорда", type:"eco", title:"Эко сенбілік", desc:"Қала тазаланды", lat:44.8488, lng:65.4823},
  {city:"Қызылорда", type:"eco", title:"Ағаш отырғызу", desc:"30 ағаш отырғызылды", lat:44.850, lng:65.480},
  {city:"Қызылорда", type:"social", title:"Қарттарға көмек", desc:"Азық-түлік берілді", lat:44.852, lng:65.490},
  {city:"Қызылорда", type:"social", title:"Балаларға көмек", desc:"Оқу құралдары", lat:44.846, lng:65.470},
  {city:"Қызылорда", type:"volunteer", title:"Еріктілер акциясы", desc:"40 адам қатысты", lat:44.845, lng:65.475},

  // 🟢 АСТАНА
  {city:"Астана", type:"eco", title:"Green city акциясы", desc:"Қала көгалдандырылды", lat:51.1694, lng:71.4491},
  {city:"Астана", type:"eco", title:"Қоқыс сұрыптау", desc:"Жоба іске қосылды", lat:51.180, lng:71.430},
  {city:"Астана", type:"social", title:"Қарттарға көмек", desc:"10 адамға көмек", lat:51.170, lng:71.440},
  {city:"Астана", type:"volunteer", title:"Жастар күні", desc:"Волонтерлік акция", lat:51.175, lng:71.420},

  // 🟡 АЛМАТЫ
  {city:"Алматы", type:"eco", title:"Recycle акциясы", desc:"Пластик жиналды", lat:43.2220, lng:76.8512},
  {city:"Алматы", type:"eco", title:"Таза парк", desc:"Парк тазаланды", lat:43.230, lng:76.840},
  {city:"Алматы", type:"social", title:"Балалар үйі", desc:"Ойыншықтар берілді", lat:43.225, lng:76.860},
  {city:"Алматы", type:"volunteer", title:"Кітап күні", desc:"100 кітап таратылды", lat:43.215, lng:76.845},

  // 🟣 ШЫМКЕНТ
  {city:"Шымкент", type:"eco", title:"Таза қала", desc:"Қоқыс жиналды", lat:42.3417, lng:69.5901},
  {city:"Шымкент", type:"social", title:"Көмек акциясы", desc:"Азық-түлік берілді", lat:42.350, lng:69.580},
  {city:"Шымкент", type:"volunteer", title:"Балаларға көмек", desc:"Сабақ ұйымдастырылды", lat:42.345, lng:69.600}
];

// иконки
const icons = {
  eco: L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/2909/2909767.png",
    iconSize:[30,30]
  }),
  social: L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/3176/3176293.png",
    iconSize:[30,30]
  }),
  volunteer: L.icon({
    iconUrl:"https://cdn-icons-png.flaticon.com/512/847/847969.png",
    iconSize:[30,30]
  })
};

let markers = [];

function render(type="all"){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];

  points.forEach(p=>{
    if(type!=="all" && p.type!==type) return;

    const marker = L.marker([p.lat,p.lng],{
      icon:icons[p.type]
    }).addTo(map);

    marker.bindPopup(`
      <b>${p.title}</b><br>
      ${p.desc}<br>
      📍 ${p.city}
    `);

    markers.push(marker);
  });
}

render();

// фильтр
document.getElementById("typeFilter").addEventListener("change",(e)=>{
  render(e.target.value);
});
</script>

</body>
</html>
